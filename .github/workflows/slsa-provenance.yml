# Generates SLSA Level 3 provenance for the pathfinder-mcp binary.
# The provenance file can be verified using:
#   https://github.com/slsa-framework/slsa-verifier
#
# This workflow runs in parallel with release-binaries.yml on every release,
# building the Linux x86_64 binary independently and generating a signed
# attestation (.intoto.jsonl) that is uploaded to the same GitHub Release.
#
# The hash is passed as a plain `base64-subjects` string via a job output.
# We previously used `base64-subjects-as-file` with a plain artifact name,
# but that input requires a JSON handle produced by the companion action
# `create-base64-subjects-from-file` — not a raw artifact name. Passing a
# plain name causes the generator to fail with:
#   "Input required and not supplied: path"
# Using `base64-subjects` with a job output avoids this entirely.

name: SLSA Provenance

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to attest (e.g. v0.1.4)"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-tag:
    name: Check Release Tag
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check if this is a pathfinder-mcp release
        id: check
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag_name }}"
          # Match the unified release tag format: v0.1.4, v1.0.0, etc.
          # Sub-crate tags (pathfinder-mcp-common-v*, etc.) do NOT match.
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Linux Binary
    needs: check-tag
    if: needs.check-tag.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      # base64-encoded sha256 digest line for the binary. Consumed by the
      # provenance job via `base64-subjects`. Format matches sha256sum output:
      #   "<sha256>  <filename>\n"  base64-encoded with no line wrapping.
      hash: ${{ steps.hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.check-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: |
          cargo build --release --bin pathfinder-mcp
          cp target/release/pathfinder-mcp pathfinder-mcp-x86_64-unknown-linux-gnu

      - name: Generate provenance hash
        id: hash
        run: |
          set -euo pipefail
          # Produce a base64-encoded sha256sum line suitable for the generator's
          # `base64-subjects` input. -w0 disables line wrapping so the value is
          # a single line that survives GitHub Actions output handling.
          echo "hash=$(sha256sum pathfinder-mcp-x86_64-unknown-linux-gnu | base64 -w0)" >> "$GITHUB_OUTPUT"

  provenance:
    name: Generate Provenance
    needs: [check-tag, build]
    if: needs.build.result == 'success'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      # Pass the hash inline as a plain base64 string — the correct interface
      # for a single artifact. `base64-subjects-as-file` requires a JSON handle
      # from the create-base64-subjects-from-file companion action; a raw
      # artifact name is not valid and causes the generator to exit with code 1.
      base64-subjects: "${{ needs.build.outputs.hash }}"
      upload-assets: true
      upload-tag-name: "${{ needs.check-tag.outputs.tag }}"
