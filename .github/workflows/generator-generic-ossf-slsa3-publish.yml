# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Generates SLSA Level 3 provenance for the pathfinder-mcp binary.
# The provenance file can be verified using:
#   https://github.com/slsa-framework/slsa-verifier
#
# IMPORTANT: This workflow MUST remain separate from release-binaries.yml.
# The SLSA generator uses a reusable workflow call (`uses:`) for the provenance
# job, which requires it to control the entire job graph — this cannot be
# embedded inside another workflow without breaking the L3 trust boundary.
#
# This workflow runs in parallel with release-binaries.yml on every release,
# building the Linux binary independently and generating a signed attestation
# (.intoto.jsonl) that is uploaded to the same GitHub Release.

name: SLSA Provenance

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to attest (e.g. pathfinder-mcp-v0.1.1)"
        required: true
        type: string
  release:
    types: [created]

jobs:
  # Guard: only generate provenance for the top-level pathfinder-mcp release,
  # not for sub-crate releases (pathfinder-mcp-lsp-v*, pathfinder-mcp-search-v*, etc.)
  check-tag:
    name: Check Release Tag
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check if this is a pathfinder-mcp release
        id: check
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag_name }}"
          if [[ "$TAG" == pathfinder-mcp-v* ]] && [[ "$TAG" != pathfinder-mcp-lsp-v* ]] && \
             [[ "$TAG" != pathfinder-mcp-search-v* ]] && [[ "$TAG" != pathfinder-mcp-treesitter-v* ]] && \
             [[ "$TAG" != pathfinder-mcp-common-v* ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  # Build the Linux binary and compute sha256 hashes as provenance subjects.
  # SLSA L3 requires this workflow to independently build the artifacts —
  # it cannot reuse binaries from release-binaries.yml without breaking the
  # integrity guarantee.
  build:
    name: Build Linux Binary
    needs: check-tag
    if: needs.check-tag.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      digests: ${{ steps.hash.outputs.digests }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: |
          cargo build --release --bin pathfinder-mcp
          # Stage the binary with a release-friendly name so the provenance
          # subject matches the artifact name in the release.
          cp target/release/pathfinder-mcp pathfinder-mcp-x86_64-unknown-linux-gnu

      - name: Generate provenance subjects
        id: hash
        run: |
          set -euo pipefail
          echo "hashes=$(sha256sum pathfinder-mcp-x86_64-unknown-linux-gnu | base64 -w0)" >> "${GITHUB_OUTPUT}"

  # Calls the SLSA generator as a reusable workflow — generates a signed
  # .intoto.jsonl attestation and uploads it to the GitHub Release.
  provenance:
    needs: [build]
    if: needs.build.result == 'success'
    permissions:
      actions: read   # To read the workflow path.
      id-token: write # To sign the provenance via Sigstore.
      contents: write # To upload the attestation to the release.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"
      upload-assets: true
