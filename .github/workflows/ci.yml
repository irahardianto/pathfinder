name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Lint (cheapest check — fail fast)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

  # ──────────────────────────────────────────────
  # Stage 2: Test + Coverage
  # ──────────────────────────────────────────────
  test:
    name: Test + Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Run tests with coverage
        run: >-
          cargo llvm-cov nextest
          --all-features
          --workspace
          --lcov
          --output-path lcov.info

      - name: Upload coverage to DeepSource
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh
          ./bin/deepsource report \
            --analyzer test-coverage \
            --key rust \
            --value-file lcov.info

  # ──────────────────────────────────────────────
  # Stage 3: Security — Dependency audit
  # ──────────────────────────────────────────────
  cargo-deny:
    name: Cargo Deny
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check licenses, advisories, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@v2

  # ──────────────────────────────────────────────
  # Stage 3: Security — Vulnerability scan
  # ──────────────────────────────────────────────
  osv-scanner:
    name: OSV Scanner
    needs: lint
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        ./

  # ──────────────────────────────────────────────
  # Release — Step 1: Open/update the release PR
  #
  # Runs only on pushes to main (not on PRs).
  # Reads Git log since the last tag, bumps versions per Conventional Commits,
  # and opens/refreshes a "release PR" for human review.
  #
  # The concurrency group serialises concurrent main-branch pushes so two
  # release-plz runs never race against each other.
  # ──────────────────────────────────────────────
  release-pr:
    name: Open Release PR
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, cargo-deny, osv-scanner]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz (release-pr)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────
  # Release — Step 2: Publish to crates.io + create GitHub Release
  #
  # Runs only on pushes to main (not on PRs).
  # Detects whether the HEAD commit bumped any crate versions (i.e., the
  # release PR was just merged) and, if so, publishes to crates.io in
  # dependency order and creates a GitHub Release with an auto-generated
  # changelog.
  #
  # IMPORTANT: GITHUB_TOKEN cannot trigger downstream workflow runs — releases
  # created by GITHUB_TOKEN do NOT fire the on:release webhook.  We use
  # RELEASE_GITHUB_TOKEN (a PAT with repo scope) so that the release event
  # is attributed to a real user and release-binaries.yml is triggered.
  #
  # NOTE: this job does NOT depend on release-pr — they are sibling steps that
  # both run after tests pass.  release-pr creates the PR; release-publish acts
  # on the PR once it is merged (a subsequent push to main).
  # ──────────────────────────────────────────────
  release-publish:
    name: Publish Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, cargo-deny, osv-scanner]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-plz-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz (release)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
