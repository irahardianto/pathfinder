name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # Detect whether source code actually changed.
  # When only workflow files, docs, or configs change,
  # we skip the expensive lint/test/security pipeline.
  # ──────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'rust-toolchain.toml'

  # ──────────────────────────────────────────────
  # Stage 1: Lint (cheapest check — fail fast)
  # Skipped when no code files changed.
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

  # ──────────────────────────────────────────────
  # Stage 2: Test + Coverage
  # Skipped when no code files changed.
  # ──────────────────────────────────────────────
  test:
    name: Test + Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Clean stale integration test binaries
        # Swatinem/rust-cache may restore lsp_client_integration binaries from
        # a previous CI run where --features integration was active. Nextest
        # does NOT respect Cargo's required-features and will run these stale
        # binaries, causing panics when the mock LSP binary is absent.
        # Removing them ensures only freshly-built (feature-gated) binaries run.
        run: rm -f target/debug/deps/lsp_client_integration-*

      - name: Run tests with coverage
        # Excludes the `integration` feature to keep unit tests fast.
        # Integration tests run in the separate `integration-tests` job below.
        run: >-
          cargo llvm-cov nextest
          --workspace
          --lcov
          --output-path lcov.info

      - name: Verify coverage report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ ! -f lcov.info ]; then
            echo "::error::lcov.info was not generated"
            exit 1
          fi
          LINES=$(wc -l < lcov.info)
          if [ "$LINES" -lt 100 ]; then
            echo "::error::lcov.info suspiciously small ($LINES lines) — coverage generation may have failed"
            exit 1
          fi
          echo "Coverage report verified: $LINES lines"

      - name: Upload coverage to DeepSource
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        timeout-minutes: 5
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh
          ./bin/deepsource report \
            --analyzer test-coverage \
            --key rust \
            --value-file lcov.info

  # ──────────────────────────────────────────────
  # Stage 2b: Integration Tests
  #
  # Runs after lint (not after test) to maximize parallelism.
  # These tests require spawning real subprocesses (mock LSP, git, file
  # watcher) and are gated behind `--features integration` to prevent
  # them from running in the unit-test-only `test` job above.
  #
  # IMPORTANT: The test-mock-lsp production binary must be built
  # explicitly. `cargo nextest run` only builds test targets (in deps/),
  # NOT production binaries. The mock_binary() helper locates the binary
  # at target/debug/test-mock-lsp, which only `cargo build` produces.
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build mock LSP binary
        # cargo nextest builds test targets (target/debug/deps/) but NOT
        # production binaries (target/debug/test-mock-lsp). The integration
        # tests locate the mock binary via mock_binary() which walks up from
        # current_exe() to target/debug/ and joins "test-mock-lsp". Without
        # this explicit build step, the binary does not exist and tests panic.
        run: cargo build -p test-mock-lsp

      - name: Run integration tests
        # --features integration activates the integration test feature gate
        # in pathfinder-lsp, compiling lsp_client_integration.rs and its
        # common module which depends on the mock binary built above.
        run: cargo nextest run --workspace --features integration --test-threads 4

  # ──────────────────────────────────────────────
  # Stage 3: Security — Dependency audit
  # Skipped when no code files changed.
  # ──────────────────────────────────────────────
  cargo-deny:
    name: Cargo Deny
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check licenses, advisories, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@v2

  # ──────────────────────────────────────────────
  # Stage 3: Security — Vulnerability scan
  # Skipped when no code files changed.
  # ──────────────────────────────────────────────
  osv-scanner:
    name: OSV Scanner
    needs: lint
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        ./

  # ──────────────────────────────────────────────
  # Release — Step 1: Open/update the release PR
  #
  # Runs ONLY on pushes to main (not PRs).
  # Reads the git log since the last tag, bumps versions per Conventional
  # Commits, and opens (or updates) a "release PR" containing:
  #   - Bumped Cargo.toml versions for each affected crate
  #   - Updated CHANGELOG.md entries
  #
  # This job runs when EITHER:
  #   (a) No code changed — release-plz will no-op safely, OR
  #   (b) All CI stages passed successfully.
  #
  # IMPORTANT: Uses RELEASE_GITHUB_TOKEN (a PAT) — not GITHUB_TOKEN.
  # The default GITHUB_TOKEN causes 403 "not permitted to create pull
  # requests" errors in many repo configurations. The PAT also ensures
  # that when the release PR is merged, the resulting push fires
  # downstream workflows correctly.
  #
  # The concurrency group serialises concurrent main-branch pushes so
  # two release-plz runs never race against each other.
  # ──────────────────────────────────────────────
  release-pr:
    name: Open Release PR
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (needs.changes.outputs.code == 'false' || (
        needs.test.result == 'success' &&
        needs.integration-tests.result == 'success' &&
        needs.cargo-deny.result == 'success' &&
        needs.osv-scanner.result == 'success'
      ))
    needs: [changes, test, integration-tests, cargo-deny, osv-scanner]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz (release-pr)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────
  # Release — Step 2: Publish to crates.io + create GitHub Release
  #
  # Runs ONLY on pushes to main (not PRs).
  # Detects whether the HEAD commit bumped any crate versions (i.e., the
  # release PR was just merged) and, if so, publishes to crates.io in
  # workspace dependency order and creates a GitHub Release.
  #
  # This job runs when EITHER:
  #   (a) No code changed — release-plz will no-op safely, OR
  #   (b) All CI stages passed successfully.
  #
  # IMPORTANT: Uses RELEASE_GITHUB_TOKEN (a PAT) so that the GitHub
  # Release event fires the on:release webhook — this triggers
  # release-binaries.yml and slsa-provenance.yml downstream.
  # GITHUB_TOKEN-created releases do NOT fire this webhook.
  #
  # NOTE: release-pr and release are SIBLINGS, not sequential.
  # Both run after CI passes. release-pr opens the PR; release publishes
  # on a subsequent push (when the PR is merged). On a normal code push,
  # release sees nothing new to publish and no-ops.
  # ──────────────────────────────────────────────
  release:
    name: Release
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (needs.changes.outputs.code == 'false' || (
        needs.test.result == 'success' &&
        needs.integration-tests.result == 'success' &&
        needs.cargo-deny.result == 'success' &&
        needs.osv-scanner.result == 'success'
      ))
    needs: [changes, test, integration-tests, cargo-deny, osv-scanner]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-plz-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz (release)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
