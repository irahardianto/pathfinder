name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # Detect whether source code actually changed.
  # When only workflow files, docs, or configs change,
  # we skip the expensive lint/test/security pipeline.
  # ──────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'rust-toolchain.toml'

  # ──────────────────────────────────────────────
  # Stage 1: Lint (cheapest check — fail fast)
  # Skipped when no code files changed.
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

  # ──────────────────────────────────────────────
  # Stage 2: Test + Coverage
  # Skipped when no code files changed.
  # ──────────────────────────────────────────────
  test:
    name: Test + Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Run tests with coverage
        run: >-
          cargo llvm-cov nextest
          --all-features
          --workspace
          --lcov
          --output-path lcov.info

      - name: Upload coverage to DeepSource
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh
          ./bin/deepsource report \
            --analyzer test-coverage \
            --key rust \
            --value-file lcov.info

  # ──────────────────────────────────────────────
  # Stage 3: Security — Dependency audit
  # Skipped when no code files changed.
  # ──────────────────────────────────────────────
  cargo-deny:
    name: Cargo Deny
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check licenses, advisories, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@v2

  # ──────────────────────────────────────────────
  # Stage 3: Security — Vulnerability scan
  # Skipped when no code files changed.
  # ──────────────────────────────────────────────
  osv-scanner:
    name: OSV Scanner
    needs: lint
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        ./

  # ──────────────────────────────────────────────
  # Release — Step 1: Open/update the release PR
  #
  # Runs ONLY on pushes to main (not PRs).
  # Reads the git log since the last tag, bumps versions per Conventional
  # Commits, and opens (or updates) a "release PR" containing:
  #   - Bumped Cargo.toml versions for each affected crate
  #   - Updated CHANGELOG.md entries
  #
  # This job runs when EITHER:
  #   (a) No code changed — release-plz will no-op safely, OR
  #   (b) All CI stages passed successfully.
  #
  # IMPORTANT: Uses RELEASE_GITHUB_TOKEN (a PAT) — not GITHUB_TOKEN.
  # The default GITHUB_TOKEN causes 403 "not permitted to create pull
  # requests" errors in many repo configurations. The PAT also ensures
  # that when the release PR is merged, the resulting push fires
  # downstream workflows correctly.
  #
  # The concurrency group serialises concurrent main-branch pushes so
  # two release-plz runs never race against each other.
  # ──────────────────────────────────────────────
  release-pr:
    name: Open Release PR
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (needs.changes.outputs.code == 'false' || (
        needs.test.result == 'success' &&
        needs.cargo-deny.result == 'success' &&
        needs.osv-scanner.result == 'success'
      ))
    needs: [changes, test, cargo-deny, osv-scanner]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz (release-pr)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────
  # Release — Step 2: Publish to crates.io + create GitHub Release
  #
  # Runs ONLY on pushes to main (not PRs).
  # Detects whether the HEAD commit bumped any crate versions (i.e., the
  # release PR was just merged) and, if so, publishes to crates.io in
  # workspace dependency order and creates a GitHub Release.
  #
  # This job runs when EITHER:
  #   (a) No code changed — release-plz will no-op safely, OR
  #   (b) All CI stages passed successfully.
  #
  # IMPORTANT: Uses RELEASE_GITHUB_TOKEN (a PAT) so that the GitHub
  # Release event fires the on:release webhook — this triggers
  # release-binaries.yml and slsa-provenance.yml downstream.
  # GITHUB_TOKEN-created releases do NOT fire this webhook.
  #
  # NOTE: release-pr and release are SIBLINGS, not sequential.
  # Both run after CI passes. release-pr opens the PR; release publishes
  # on a subsequent push (when the PR is merged). On a normal code push,
  # release sees nothing new to publish and no-ops.
  # ──────────────────────────────────────────────
  release:
    name: Release
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (needs.changes.outputs.code == 'false' || (
        needs.test.result == 'success' &&
        needs.cargo-deny.result == 'success' &&
        needs.osv-scanner.result == 'success'
      ))
    needs: [changes, test, cargo-deny, osv-scanner]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-plz-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz (release)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
