name: Release Binaries

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (e.g. v0.1.4)"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-tag:
    name: Check Release Tag
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if this is a pathfinder-mcp release
        id: check
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git tag -l "$TAG" | grep -q .; then
            echo "::error::Tag ${TAG} does not exist in the repository. Create the tag first."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "should-run=true" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  upload-binaries:
    name: Upload Binaries (${{ matrix.target }})
    needs: check-tag
    if: needs.check-tag.outputs.should-run == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.check-tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Upload Binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pathfinder-mcp
          target: ${{ matrix.target }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/tags/${{ needs.check-tag.outputs.tag }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [check-tag, upload-binaries]
    if: needs.check-tag.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew Tap
        uses: actions/checkout@v5
        with:
          repository: irahardianto/homebrew-pathfinder
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Wait for release assets to propagate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          set -euo pipefail

          EXPECTED_ASSETS=(
            "pathfinder-mcp-x86_64-apple-darwin.sha256"
            "pathfinder-mcp-aarch64-apple-darwin.sha256"
            "pathfinder-mcp-x86_64-unknown-linux-gnu.sha256"
            "pathfinder-mcp-aarch64-unknown-linux-gnu.sha256"
          )

          MAX_ATTEMPTS=30
          WAIT_SECONDS=10

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Polling release assets (attempt ${attempt}/${MAX_ATTEMPTS})..."

            RESPONSE=$(curl -fsSL \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/irahardianto/pathfinder/releases/tags/${TAG_NAME}") || true

            if [[ -z "$RESPONSE" ]]; then
              echo "  API request failed, retrying in ${WAIT_SECONDS}s..."
              sleep "$WAIT_SECONDS"
              continue
            fi

            UPLOADED=$(echo "$RESPONSE" | jq -r '.assets[].name' 2>/dev/null || true)
            if [[ -z "$UPLOADED" ]]; then
              echo "  No assets found yet, retrying in ${WAIT_SECONDS}s..."
              sleep "$WAIT_SECONDS"
              continue
            fi

            ALL_PRESENT=true
            for asset in "${EXPECTED_ASSETS[@]}"; do
              if ! echo "$UPLOADED" | grep -qF "$asset"; then
                echo "  Missing: ${asset}"
                ALL_PRESENT=false
              fi
            done

            if [[ "$ALL_PRESENT" == "true" ]]; then
              echo "All release assets are available."
              exit 0
            fi

            sleep "$WAIT_SECONDS"
          done

          echo "::error::Timed out waiting for release assets after $((MAX_ATTEMPTS * WAIT_SECONDS))s"
          exit 1

      - name: Generate and Push Formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          set -euo pipefail

          VERSION=${TAG_NAME#v}

          URL_BASE="https://github.com/irahardianto/pathfinder/releases/download/${TAG_NAME}"

          download_with_retry() {
            local url="$1"
            local output="$2"
            local max_retries=5
            local retry_delay=15

            for attempt in $(seq 1 "$max_retries"); do
              echo "Downloading ${url} (attempt ${attempt}/${max_retries})..."
              if curl -fsSL --connect-timeout 30 --max-time 120 "$url" -o "$output"; then
                return 0
              fi
              echo "  Failed, retrying in ${retry_delay}s..."
              sleep "$retry_delay"
            done

            echo "::error::Failed to download ${url} after ${max_retries} attempts"
            return 1
          }

          download_with_retry "${URL_BASE}/pathfinder-mcp-x86_64-apple-darwin.sha256"      mac_intel.sha256
          download_with_retry "${URL_BASE}/pathfinder-mcp-aarch64-apple-darwin.sha256"     mac_arm.sha256
          download_with_retry "${URL_BASE}/pathfinder-mcp-x86_64-unknown-linux-gnu.sha256" linux_intel.sha256
          download_with_retry "${URL_BASE}/pathfinder-mcp-aarch64-unknown-linux-gnu.sha256" linux_arm.sha256

          MAC_INTEL_SHA=$(awk '{print $1}' mac_intel.sha256)
          MAC_ARM_SHA=$(awk '{print $1}'   mac_arm.sha256)
          LINUX_INTEL_SHA=$(awk '{print $1}' linux_intel.sha256)
          LINUX_ARM_SHA=$(awk '{print $1}'  linux_arm.sha256)

          : "${MAC_INTEL_SHA:?mac_intel SHA is empty — binary upload may have failed}"
          : "${MAC_ARM_SHA:?mac_arm SHA is empty — binary upload may have failed}"
          : "${LINUX_INTEL_SHA:?linux_intel SHA is empty — binary upload may have failed}"
          : "${LINUX_ARM_SHA:?linux_arm SHA is empty — binary upload may have failed}"

          validate_sha256() {
            local value="$1" label="$2"
            if [[ ! "$value" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::${label} SHA256 is not a valid 64-char hex string: ${value}"
              exit 1
            fi
          }

          validate_sha256 "$MAC_INTEL_SHA"   "mac_intel"
          validate_sha256 "$MAC_ARM_SHA"     "mac_arm"
          validate_sha256 "$LINUX_INTEL_SHA" "linux_intel"
          validate_sha256 "$LINUX_ARM_SHA"   "linux_arm"

          mkdir -p tap/Formula

          cat > tap/Formula/pathfinder-mcp.rb <<FORMULA
          class PathfinderMcp < Formula
            desc "Pathfinder MCP Server"
            homepage "https://github.com/irahardianto/pathfinder"
            version "${VERSION}"

            on_macos do
              on_intel do
                url "${URL_BASE}/pathfinder-mcp-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_INTEL_SHA}"
              end
              on_arm do
                url "${URL_BASE}/pathfinder-mcp-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "${URL_BASE}/pathfinder-mcp-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_INTEL_SHA}"
              end
              on_arm do
                url "${URL_BASE}/pathfinder-mcp-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              end
            end

            def install
              bin.install "pathfinder-mcp"
            end

            test do
              assert_match version, shell_output("\#{bin}/pathfinder-mcp --version")
            end
          end
          FORMULA

          sed -i 's/^          //' tap/Formula/pathfinder-mcp.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pathfinder-mcp.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update pathfinder-mcp to ${VERSION}"
          git push
