name: Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  upload-binaries:
    name: Upload Binaries
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Upload Binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pathfinder-mcp
          target: ${{ matrix.target }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: upload-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: irahardianto/homebrew-pathfinder
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Generate and Push Formula
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          # Extract version from tag (e.g. pathfinder-mcp-v0.1.0 -> 0.1.0)
          if [[ "$TAG_NAME" == pathfinder-mcp-v* ]]; then
            VERSION=${TAG_NAME#pathfinder-mcp-v}
          elif [[ "$TAG_NAME" == v* ]]; then
            VERSION=${TAG_NAME#v}
          else
            VERSION=$TAG_NAME
          fi
          
          URL_BASE="https://github.com/irahardianto/pathfinder/releases/download/${TAG_NAME}"
          
          # Fetch checksums generated by the previous job
          curl -sL "${URL_BASE}/pathfinder-mcp-x86_64-apple-darwin.tar.gz.sha256" > mac_intel.sha256
          curl -sL "${URL_BASE}/pathfinder-mcp-aarch64-apple-darwin.tar.gz.sha256" > mac_arm.sha256
          curl -sL "${URL_BASE}/pathfinder-mcp-x86_64-unknown-linux-gnu.tar.gz.sha256" > linux_intel.sha256
          
          MAC_INTEL_SHA=$(awk '{print $1}' mac_intel.sha256)
          MAC_ARM_SHA=$(awk '{print $1}' mac_arm.sha256)
          LINUX_INTEL_SHA=$(awk '{print $1}' linux_intel.sha256)

          mkdir -p tap/Formula
          
          cat << EOF > tap/Formula/pathfinder-mcp.rb
          class PathfinderMcp < Formula
            desc "Pathfinder MCP Server"
            homepage "https://github.com/irahardianto/pathfinder"
            version "${VERSION}"

            on_macos do
              on_intel do
                url "${URL_BASE}/pathfinder-mcp-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_INTEL_SHA}"
              end
              on_arm do
                url "${URL_BASE}/pathfinder-mcp-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "${URL_BASE}/pathfinder-mcp-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_INTEL_SHA}"
              end
            end

            def install
              bin.install "pathfinder-mcp"
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pathfinder-mcp.rb
          git commit -m "Update pathfinder-mcp to ${VERSION}"
          git push
