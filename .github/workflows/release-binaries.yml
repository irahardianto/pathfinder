name: Release Binaries

# Triggered automatically by release-plz when it creates a GitHub Release,
# or by any manual release creation. No tag-based naming required.
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (e.g. pathfinder-mcp-v0.1.1)"
        required: true
        type: string

# Only run for the main pathfinder-mcp crate release, not sub-crate releases.
# release-plz tags sub-crates as "pathfinder-mcp-lsp-v*", "pathfinder-mcp-search-v*", etc.
# We only want to build binaries for the top-level "pathfinder-mcp-v*" release.
jobs:
  check-tag:
    name: Check Release Tag
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check if this is a pathfinder-mcp release
        id: check
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag_name }}"
          if [[ "$TAG" == pathfinder-mcp-v* ]] && [[ "$TAG" != pathfinder-mcp-lsp-v* ]] && \
             [[ "$TAG" != pathfinder-mcp-search-v* ]] && [[ "$TAG" != pathfinder-mcp-treesitter-v* ]] && \
             [[ "$TAG" != pathfinder-mcp-common-v* ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  upload-binaries:
    name: Upload Binaries
    needs: check-tag
    if: needs.check-tag.outputs.should-run == 'true'
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Upload Binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pathfinder-mcp
          target: ${{ matrix.target }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.check-tag.outputs.tag }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [check-tag, upload-binaries]
    if: needs.check-tag.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: irahardianto/homebrew-pathfinder
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Generate and Push Formula
        env:
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          set -euo pipefail

          # release-plz tags workspaces as "<crate-name>-v<semver>", e.g. pathfinder-mcp-v0.2.0
          VERSION=${TAG_NAME#pathfinder-mcp-v}

          URL_BASE="https://github.com/irahardianto/pathfinder/releases/download/${TAG_NAME}"

          # Fetch checksums produced by the upload-binaries job above.
          # Use -f so curl fails (non-zero exit) if the file is missing — catching
          # races or naming mismatches before they silently produce an empty SHA.
          curl -fsSL "${URL_BASE}/pathfinder-mcp-x86_64-apple-darwin.tar.gz.sha256"      > mac_intel.sha256
          curl -fsSL "${URL_BASE}/pathfinder-mcp-aarch64-apple-darwin.tar.gz.sha256"     > mac_arm.sha256
          curl -fsSL "${URL_BASE}/pathfinder-mcp-x86_64-unknown-linux-gnu.tar.gz.sha256" > linux_intel.sha256

          MAC_INTEL_SHA=$(awk '{print $1}' mac_intel.sha256)
          MAC_ARM_SHA=$(awk '{print $1}'   mac_arm.sha256)
          LINUX_INTEL_SHA=$(awk '{print $1}' linux_intel.sha256)

          # Guard: abort if any SHA is empty (e.g. curl returned an HTML error page).
          : "${MAC_INTEL_SHA:?mac_intel SHA is empty — binary upload may have failed}"
          : "${MAC_ARM_SHA:?mac_arm SHA is empty — binary upload may have failed}"
          : "${LINUX_INTEL_SHA:?linux_intel SHA is empty — binary upload may have failed}"

          mkdir -p tap/Formula

          # Write the Ruby formula using printf to avoid heredoc YAML parsing issues.
          # shellcheck disable=SC2016
          printf 'class PathfinderMcp < Formula\n' > tap/Formula/pathfinder-mcp.rb
          printf '  desc "Pathfinder MCP Server"\n' >> tap/Formula/pathfinder-mcp.rb
          printf '  homepage "https://github.com/irahardianto/pathfinder"\n' >> tap/Formula/pathfinder-mcp.rb
          printf '  version "%s"\n' "$VERSION" >> tap/Formula/pathfinder-mcp.rb
          printf '\n' >> tap/Formula/pathfinder-mcp.rb
          printf '  on_macos do\n' >> tap/Formula/pathfinder-mcp.rb
          printf '    on_intel do\n' >> tap/Formula/pathfinder-mcp.rb
          printf '      url "%s/pathfinder-mcp-x86_64-apple-darwin.tar.gz"\n' "$URL_BASE" >> tap/Formula/pathfinder-mcp.rb
          printf '      sha256 "%s"\n' "$MAC_INTEL_SHA" >> tap/Formula/pathfinder-mcp.rb
          printf '    end\n' >> tap/Formula/pathfinder-mcp.rb
          printf '    on_arm do\n' >> tap/Formula/pathfinder-mcp.rb
          printf '      url "%s/pathfinder-mcp-aarch64-apple-darwin.tar.gz"\n' "$URL_BASE" >> tap/Formula/pathfinder-mcp.rb
          printf '      sha256 "%s"\n' "$MAC_ARM_SHA" >> tap/Formula/pathfinder-mcp.rb
          printf '    end\n' >> tap/Formula/pathfinder-mcp.rb
          printf '  end\n' >> tap/Formula/pathfinder-mcp.rb
          printf '\n' >> tap/Formula/pathfinder-mcp.rb
          printf '  on_linux do\n' >> tap/Formula/pathfinder-mcp.rb
          printf '    on_intel do\n' >> tap/Formula/pathfinder-mcp.rb
          printf '      url "%s/pathfinder-mcp-x86_64-unknown-linux-gnu.tar.gz"\n' "$URL_BASE" >> tap/Formula/pathfinder-mcp.rb
          printf '      sha256 "%s"\n' "$LINUX_INTEL_SHA" >> tap/Formula/pathfinder-mcp.rb
          printf '    end\n' >> tap/Formula/pathfinder-mcp.rb
          printf '  end\n' >> tap/Formula/pathfinder-mcp.rb
          printf '\n' >> tap/Formula/pathfinder-mcp.rb
          printf '  def install\n' >> tap/Formula/pathfinder-mcp.rb
          printf '    bin.install "pathfinder-mcp"\n' >> tap/Formula/pathfinder-mcp.rb
          printf '  end\n' >> tap/Formula/pathfinder-mcp.rb
          printf 'end\n' >> tap/Formula/pathfinder-mcp.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pathfinder-mcp.rb
          git commit -m "chore: update pathfinder-mcp to ${VERSION}"
          git push
