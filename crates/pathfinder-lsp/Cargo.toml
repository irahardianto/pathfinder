[package]
name = "pathfinder-lsp"
version = "0.1.0"
edition = "2021"
description = "Pathfinder LSP client — the Lawyer engine"

[lints]
workspace = true

[dependencies]
pathfinder-common = { path = "../pathfinder-common" }
async-trait = "0.1"
thiserror = "1"
lsp-types = "0.97"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
