[package]
name = "pathfinder"
version = "0.1.0"
edition = "2021"
description = "Pathfinder — The Headless IDE MCP Server for AI Coding Agents"

[lints]
workspace = true

[[bin]]
name = "pathfinder"
path = "src/main.rs"

[lib]
name = "pathfinder_lib"
path = "src/lib.rs"

[dependencies]
pathfinder-common = { path = "../pathfinder-common" }
pathfinder-search = { path = "../pathfinder-search" }
pathfinder-treesitter = { path = "../pathfinder-treesitter" }
rmcp = { version = "1", features = ["server", "macros", "transport-io"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[dev-dependencies]
tempfile = "3.10"
