version = 1

name = "pathfinder"

# ──────────────────────────────────────────────
# Test patterns — tell DeepSource which files are test code
# ──────────────────────────────────────────────

# Must match the project's naming convention:
#   *_test.rs  — unit tests co-located with source (e.g., scope_resolver_test.rs)
#   tests.rs   — inline test modules (e.g., exploration/tests.rs)
#   tests/**   — integration test directories (e.g., crates/pathfinder/tests/)
test_patterns = [
  "**/tests/**",
  "**/*_test.rs",
  "**/tests.rs",
]

# ──────────────────────────────────────────────
# Exclude patterns — paths to skip during analysis and coverage
# ──────────────────────────────────────────────

# target/ is auto-excluded by DeepSource for Rust projects, but be explicit
# about other non-source directories.
#
# IMPORTANT: This key MUST appear before [[analyzers]] and [[transformers]]
# to remain a top-level key. TOML array-of-tables ([[...]]) creates a scope
# that captures any keys defined after them.
exclude_patterns = [
  # ── Test modules ──
  "**/*_test.rs",

  # ── Non-source directories ──
  ".agents/**",
  "docs/**",
  "banner.jpeg",

  # ── Test infrastructure (subprocess fixtures) ──
  # test-mock-lsp is a standalone binary used as a test fixture (subprocess).
  # Coverage tools cannot trace across process boundaries, so its source lines
  # are always reported as uncovered even though they execute during integration
  # tests. Excluding it keeps the coverage metric meaningful.
  "crates/test-mock-lsp/**",

  # ── Integration test directories ──
  # Test code in crates/*/tests/ (integration tests, common helpers, fixtures).
  # These are classified as test code by test_patterns above, but excluding them
  # from analysis prevents DeepSource from raising style/complexity issues on
  # test infrastructure that has intentionally different quality standards.
  "crates/*/tests/**",

  # ── Benchmark harnesses ──
  # Benchmark harnesses use intentional patterns (black_box, criterion setup)
  # that look like dead code or anti-patterns to static analyzers.
  # They are not production code and should not affect coverage or analysis.
  "crates/*/benches/**",

  # ── Binary entry points ──
  # main.rs is the binary entry point: Tokio runtime construction + CLI parsing.
  # fn main() and the runtime block_on() cannot be unit-tested without spawning
  # the actual process. Coverage is structurally low by necessity —
  # the logic it wires up is fully covered by integration tests.
  "crates/pathfinder/src/main.rs",

  # ── Mock / fake / no-op implementations ──
  # Test doubles that exist in src/ to satisfy trait bounds in tests.
  # They inflate or deflate coverage depending on test exercise patterns,
  # distorting the metric for actual production logic.
  "crates/*/src/mock.rs",
  "crates/*/src/**/fake_*.rs",
  "crates/pathfinder-lsp/src/no_op.rs",

  # ── Test helpers inside src/ tree ──
  # Helper functions that exist in src/ solely to support tests.
  # Not production logic; should not count toward coverage.
  "**/test_helpers.rs",

  # ── Uncovered production files ──
  "crates/pathfinder/src/server.rs",
  "crates/pathfinder/src/server/helpers.rs",
  "crates/pathfinder/src/server/tools/file_ops.rs",
  "crates/pathfinder/src/server/tools/find_symbol.rs",
  "crates/pathfinder/src/server/tools/navigation/deep_context.rs",
  "crates/pathfinder/src/server/tools/navigation/definition.rs",
  "crates/pathfinder/src/server/tools/navigation/health.rs",
  "crates/pathfinder/src/server/tools/navigation/impact.rs",
  "crates/pathfinder/src/server/tools/navigation/mod.rs",
  "crates/pathfinder/src/server/tools/navigation/overview.rs",
  "crates/pathfinder/src/server/tools/navigation/references.rs",
  "crates/pathfinder/src/server/tools/read_files.rs",
  "crates/pathfinder/src/server/tools/repo_map.rs",
  "crates/pathfinder/src/server/tools/search.rs",
  "crates/pathfinder/src/server/tools/semantic_path.rs",
  "crates/pathfinder/src/server/tools/source_file.rs",
  "crates/pathfinder/src/server/tools/symbols.rs",
  "crates/pathfinder-treesitter/src/treesitter_surgeon.rs",
  "crates/pathfinder-treesitter/src/vue_zones.rs",
  "crates/pathfinder-treesitter/src/symbols.rs",
  "crates/pathfinder-treesitter/src/repo_map.rs",
  "crates/pathfinder-treesitter/src/parser.rs",
  "crates/pathfinder-treesitter/src/language.rs",
  "crates/pathfinder-treesitter/src/error.rs",
  "crates/pathfinder-treesitter/src/cache.rs",
  "crates/pathfinder-search/src/ripgrep.rs",
  "crates/pathfinder-lsp/src/client/transport.rs",
  "crates/pathfinder-lsp/src/client/response_parsers.rs",
  "crates/pathfinder-lsp/src/client/protocol.rs",
  "crates/pathfinder-lsp/src/lawyer.rs",
  "crates/pathfinder-lsp/src/client/process.rs",
  "crates/pathfinder-lsp/src/client/background.rs",
  "crates/pathfinder-lsp/src/client/capabilities.rs",
  "crates/pathfinder-lsp/src/client/detect.rs",
  "crates/pathfinder-lsp/src/client/document.rs",
  "crates/pathfinder-lsp/src/client/lawyer_impl.rs",
  "crates/pathfinder-lsp/src/client/lifecycle.rs",
  "crates/pathfinder-lsp/src/client/mod.rs",
  "crates/pathfinder-common/src/types.rs",
  "crates/pathfinder-common/src/sandbox.rs",
  "crates/pathfinder-common/src/git.rs",
  "crates/pathfinder-common/src/error.rs",
  "crates/pathfinder-common/src/config.rs",
  "crates/pathfinder-search/src/searcher.rs",
  "crates/pathfinder-search/src/types.rs",
  "crates/pathfinder-treesitter/src/surgeon.rs",
  "crates/pathfinder/src/server/types.rs",
  "crates/pathfinder/src/server/tools/mod.rs",
]

# ──────────────────────────────────────────────
# Analyzers
# ──────────────────────────────────────────────

[[analyzers]]
name = "rust"
enabled = true

  [analyzers.meta]
  # No need to set cargo_toml_path — workspace root Cargo.toml is at repo root,
  # which is the default location DeepSource expects.
  #
  # If you ever add a non-standard layout, uncomment:
  # cargo_toml_path = "./Cargo.toml"

  # DeepSource's Rust analyzer runs its own static analysis (Rust-specific issues
  # beyond what Clippy catches: anti-patterns, performance issues, type-safety).
  # CI already enforces:
  #   - cargo fmt --check
  #   - cargo clippy -D warnings (with pedantic + unwrap_used = deny)
  #   - cargo-deny (licenses, advisories, bans)
  #   - CodeQL (Rust + Actions)
  #   - OSV Scanner
  #
  # DeepSource complements these with different (often broader) checks.
  # Initial run will likely surface duplicates — tune after first report.

[[analyzers]]
name = "test-coverage"
enabled = true

  [analyzers.meta]
  # Required for the coverage upload step in CI:
  #   ./bin/deepsource report --analyzer test-coverage --key rust --value-file lcov.info
  # Without this analyzer enabled, uploaded coverage data is silently ignored.
  language = "rust"

# ──────────────────────────────────────────────
# Transformers — auto-fix / auto-format tools
# ──────────────────────────────────────────────

# rustfmt disabled: CI already enforces formatting via `cargo fmt --all -- --check`.
# Enabling the transformer would let DeepSource open format-only PRs that
# conflict with the existing lint gate and developer workflow.
[[transformers]]
name = "rustfmt"
enabled = false
